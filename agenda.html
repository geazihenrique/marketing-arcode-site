<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Próximas entregas | Marketing Arcode</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body data-page="agenda">
    <div class="site-shell">
      <aside class="sidebar">
        <div class="brand-lockup">
          <span class="brand-pill">MARKETING Arcode</span>
          <h1>Próximas entregas</h1>
          <p>Visual direto das próximas datas, sem misturar serviços já passados.</p>
        </div>

        <nav class="nav-links">
          <a class="nav-link" href="./index.html">Visão Geral</a>
          <a class="nav-link" href="./calendario.html">Calendário</a>
          <a class="nav-link is-active" href="./agenda.html">Próximas entregas</a>
        </nav>
      </aside>

      <main class="page-content">
        <header class="page-header">
          <div>
            <span class="eyebrow">Operação</span>
            <h2>Próximas entregas</h2>
          </div>
        </header>

        <section class="panel">
          <div class="section-head">
            <h3>Buscar O.S.</h3>
            <span class="muted-text">Pesquise por número, cliente ou palavra-chave</span>
          </div>
          <form id="searchForm" class="search-form">
            <input
              id="searchInput"
              name="query"
              type="search"
              placeholder="Ex.: 3812, Shopee, evento, feira"
              autocomplete="off"
            />
            <button class="ghost-btn" type="submit">Buscar</button>
          </form>
          <div id="searchResults" class="event-list search-results"></div>
        </section>

        <section class="panel">
          <div class="section-head">
            <h3>Lista futura</h3>
            <span class="muted-text">A partir de hoje</span>
          </div>
          <div id="agendaGroupedList" class="event-list"></div>
        </section>
      </main>
    </div>

    <script src="./assets/config.js"></script>
    <script src="./assets/data.js"></script>
    <script src="./assets/ui.js"></script>
  </body>
</html>
